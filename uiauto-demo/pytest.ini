[pytest]

# 测试目录
testpaths =
    uitests/cases

# 测试文件命名规则
python_files =
    test_*.py

# 测试类命名规则
python_classes =
    Test*

# 测试函数命名规则
python_functions =
    test_*

# 默认命令行参数
addopts =
    -v
    -ra
    -q
    --strict-markers
    --tb=short

# 自定义 marker
markers =
    slow: slow tests
    smoke: smoke tests
    e2e: end to end tests

# 异步测试支持 (如果使用 pytest-asyncio)
# asyncio_mode = auto

# 忽略目录
norecursedirs =
    .git
    .venv
    venv
    build
    dist
    __pycache__

# console 日志配置
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s | %(levelname)-8s | %(filename)s:%(lineno)d | %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# file 日志配置
log_file = /tmp/test/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-8s | %(filename)s:%(lineno)d | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 警告处理
filterwarnings =
    ignore::DeprecationWarning
